name: Release

# Tag a version to cut a release, e.g.:  git tag v0.2.0 && git push origin v0.2.0
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write  # needed to create the GitHub Release

jobs:
  appimage:
    runs-on: ubuntu-22.04  # older runner -> wider glibc compatibility
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history for the changelog

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build/runtime libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y libxcb-cursor0 libegl1 libgl1

      - name: Install the package
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Build AppImage
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          packaging/build_appimage.sh "$VERSION"

      - name: Generate changelog
        run: |
          TAG="${GITHUB_REF_NAME}"
          PREV="$(git describe --tags --abbrev=0 "${TAG}^" 2>/dev/null || true)"
          {
            echo "## ${TAG}"
            echo
            if [ -n "$PREV" ]; then
              echo "Changes since ${PREV}:"
              echo
              git log --no-merges --pretty='- %s' "${PREV}..${TAG}"
            else
              echo "Initial release."
              echo
              git log --no-merges --pretty='- %s' "${TAG}"
            fi
          } > RELEASE_NOTES.md
          cat RELEASE_NOTES.md

      - name: Publish release
        # Pinned to a full commit SHA (this job holds a contents:write token).
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65  # v2.6.2
        with:
          body_path: RELEASE_NOTES.md
          files: dist/*.AppImage
          fail_on_unmatched_files: true
